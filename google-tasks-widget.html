<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Google Tasks Widget</title>
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
  :root {
    color-scheme: light dark;
    --bg-rgb: 255, 255, 255;
    --bg-alpha: 0.9;
    --bg: rgba(var(--bg-rgb), var(--bg-alpha));
    --fg: #1c1c1e;
    --muted: #6b6b70;
    --accent: #3b6fe0;
    --border: rgba(0, 0, 0, 0.08);
    --done-bg: rgba(59, 111, 224, 0.08);
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg-rgb: 28, 28, 30;
      --bg-alpha: 0.85;
      --fg: #f2f2f4;
      --muted: #9a9aa2;
      --accent: #7aa2ff;
      --border: rgba(255, 255, 255, 0.1);
      --done-bg: rgba(122, 162, 255, 0.12);
    }
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    color: var(--fg);
    background: transparent;
  }
  #app {
    display: flex;
    flex-direction: column;
    height: 100%;
    background: var(--bg);
    border-radius: 12px;
    overflow: hidden;
  }

  /* ---- Connect screen ---- */
  #connect-screen {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 12px;
    padding: 16px;
    text-align: center;
  }
  #connect-screen p {
    margin: 0;
    color: var(--muted);
    font-size: 13px;
  }
  button {
    font: inherit;
    cursor: pointer;
    border: none;
    border-radius: 8px;
    padding: 8px 14px;
    background: var(--accent);
    color: white;
    font-weight: 600;
  }
  button:active { transform: translateY(1px); }

  /* ---- Tasks screen ---- */
  #tasks-screen {
    display: flex;
    flex-direction: column;
    height: 100%;
  }
  .header {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 12px;
    border-bottom: 1px solid var(--border);
  }
  #list-select {
    flex: 1;
    font: inherit;
    font-weight: 600;
    background: transparent;
    color: var(--fg);
    border: none;
    outline: none;
  }
  .icon-btn {
    background: transparent;
    color: var(--muted);
    padding: 6px 10px;
    font-size: 20px;
    font-weight: normal;
  }

  #settings-panel {
    display: flex;
    flex-direction: column;
    gap: 10px;
    padding: 12px 14px;
    border-bottom: 1px solid var(--border);
    font-size: 13px;
  }
  #settings-panel label {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    color: var(--muted);
  }
  #settings-panel input[type="range"] {
    flex: 1;
    accent-color: var(--accent);
  }
  #settings-panel input[type="color"] {
    width: 36px;
    height: 24px;
    border: none;
    padding: 0;
    background: none;
    cursor: pointer;
  }
  #reset-appearance-btn {
    align-self: flex-start;
    background: transparent;
    color: var(--accent);
    font-weight: 600;
    padding: 4px 0;
    font-size: 13px;
  }

  #task-list {
    list-style: none;
    margin: 0;
    padding: 4px 0;
    overflow-y: auto;
    flex: 1;
  }
  #task-list li {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 8px 14px;
    font-size: 14px;
    transition: background 0.2s ease;
    cursor: grab;
  }
  #task-list li.done {
    background: var(--done-bg);
  }
  #task-list li.dragging {
    opacity: 0.4;
  }
  #task-list li.drag-over {
    box-shadow: inset 0 2px 0 var(--accent);
  }
  #task-list li.done span {
    text-decoration: line-through;
    color: var(--muted);
  }
  #task-list li.empty {
    color: var(--muted);
    font-style: italic;
    justify-content: center;
  }
  #task-list input[type="checkbox"] {
    margin-top: 2px;
    width: 16px;
    height: 16px;
    accent-color: var(--accent);
    flex-shrink: 0;
  }
  #task-list span {
    line-height: 1.3;
    word-break: break-word;
  }
  #task-list .notes {
    font-size: 12px;
    color: var(--muted);
    margin-top: 2px;
    white-space: pre-wrap;
    word-break: break-word;
  }

  #add-form {
    display: flex;
    gap: 8px;
    padding: 10px 12px;
    border-top: 1px solid var(--border);
  }
  #add-input {
    flex: 1;
    font: inherit;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 6px 10px;
    color: var(--fg);
    outline: none;
  }
  #add-form button {
    padding: 6px 12px;
  }

  #error {
    padding: 10px 12px;
    font-size: 12px;
    color: #e5484d;
  }

  [hidden] { display: none !important; }
</style>
</head>
<body>
  <div id="app">
    <div id="connect-screen">
      <button id="connect-btn">Connect Google Tasks</button>
      <p>Your task data stays between this page and Google — nothing is sent anywhere else.</p>
    </div>

    <div id="tasks-screen" hidden>
      <div class="header">
        <select id="list-select"></select>
        <button id="settings-btn" class="icon-btn" title="Settings">&#9881;</button>
        <button id="refresh-btn" class="icon-btn" title="Refresh">&#8635;</button>
      </div>
      <div id="settings-panel" hidden>
        <label>Background color <input type="color" id="bg-color-input" /></label>
        <label>Transparency <input type="range" id="bg-opacity-input" min="0" max="100" /></label>
        <button id="reset-appearance-btn" type="button">Reset to default</button>
      </div>
      <ul id="task-list"></ul>
      <form id="add-form">
        <input id="add-input" placeholder="Add a task…" autocomplete="off" />
        <button type="submit">Add</button>
      </form>
    </div>

    <div id="error" hidden></div>
  </div>

<script>
  // ---------------------------------------------------------------------
  // 1. Paste the OAuth Client ID you create in Google Cloud Console here.
  //    (APIs & Services > Credentials > Create Credentials > OAuth client ID
  //    > Application type: Web application)
  // ---------------------------------------------------------------------
  const CLIENT_ID = '351806837945-anjvm2o97jnum79akg28jc6nut6euat7.apps.googleusercontent.com';

  // Full read/write scope so completing tasks and adding new ones works.
  // Use 'https://www.googleapis.com/auth/tasks.readonly' if you only want
  // a read-only view.
  const SCOPE = 'https://www.googleapis.com/auth/tasks';

  const TOKEN_KEY = 'gtasks_widget_token_v1';
  const APPEARANCE_KEY = 'gtasks_widget_appearance_v1';
  const API_ROOT = 'https://tasks.googleapis.com/tasks/v1';

  let tokenClient;
  let accessToken = null;
  let tokenExpiry = 0;
  let currentListId = null;

  // ---- appearance (background color + transparency), persisted per-origin ----
  function loadAppearance() {
    try {
      const raw = localStorage.getItem(APPEARANCE_KEY);
      return raw ? JSON.parse(raw) : null;
    } catch (e) { return null; }
  }

  function saveAppearance(appearance) {
    localStorage.setItem(APPEARANCE_KEY, JSON.stringify(appearance));
  }

  function hexToRgbTriplet(hex) {
    const r = parseInt(hex.slice(1, 3), 16);
    const g = parseInt(hex.slice(3, 5), 16);
    const b = parseInt(hex.slice(5, 7), 16);
    return `${r}, ${g}, ${b}`;
  }

  function applyAppearance(appearance) {
    const root = document.documentElement;
    if (!appearance) {
      // fall back to the automatic light/dark defaults defined in CSS
      root.style.removeProperty('--bg-rgb');
      root.style.removeProperty('--bg-alpha');
      return;
    }
    root.style.setProperty('--bg-rgb', hexToRgbTriplet(appearance.color));
    root.style.setProperty('--bg-alpha', appearance.opacity / 100);
  }

  function defaultAppearanceSeed() {
    // Seed the controls near the current automatic theme so the sliders
    // start close to what's already on screen, rather than jumping.
    const dark = window.matchMedia('(prefers-color-scheme: dark)').matches;
    return { color: dark ? '#1c1c1e' : '#ffffff', opacity: dark ? 85 : 90 };
  }

  // ---- token persistence (per-origin sessionStorage, survives new-tab reloads) ----
  function saveToken(token, expiresInSec) {
    accessToken = token;
    tokenExpiry = Date.now() + expiresInSec * 1000;
    localStorage.setItem(TOKEN_KEY, JSON.stringify({ token, expiry: tokenExpiry }));
  }

  function loadToken() {
    const raw = localStorage.getItem(TOKEN_KEY);
    if (!raw) return false;
    try {
      const { token, expiry } = JSON.parse(raw);
      if (expiry > Date.now() + 60000) {
        accessToken = token;
        tokenExpiry = expiry;
        return true;
      }
    } catch (e) { /* ignore corrupt entry */ }
    return false;
  }

  // ---- OAuth flow ----
  // prompt:'' = try silently (no popup) using an existing Google session/consent.
  // forceConsent=true = show the visible Google consent popup (needs a user gesture).
  function ensureFreshToken(callback, forceConsent) {
    if (!forceConsent && accessToken && Date.now() < tokenExpiry - 60000) {
      callback();
      return;
    }
    tokenClient.callback = (resp) => {
      if (resp.error) {
        if (forceConsent) {
          showError('Google sign-in failed: ' + resp.error);
        }
        // silent attempt failing on load is expected pre-consent — show Connect button
        return;
      }
      saveToken(resp.access_token, resp.expires_in);
      callback();
    };
    tokenClient.requestAccessToken({ prompt: forceConsent ? 'consent' : '' });
  }

  window.onload = () => {
    tokenClient = google.accounts.oauth2.initTokenClient({
      client_id: CLIENT_ID,
      scope: SCOPE,
      callback: () => {}, // set per-request above
    });

    document.getElementById('connect-btn').onclick = () => ensureFreshToken(init, true);
    document.getElementById('refresh-btn').onclick = () => loadTasks(currentListId);
    document.getElementById('add-form').onsubmit = (e) => {
      e.preventDefault();
      addTask();
    };
    document.getElementById('list-select').onchange = (e) => {
      currentListId = e.target.value;
      loadTasks(currentListId);
    };

    // ---- settings panel wiring ----
    const settingsBtn = document.getElementById('settings-btn');
    const settingsPanel = document.getElementById('settings-panel');
    const colorInput = document.getElementById('bg-color-input');
    const opacityInput = document.getElementById('bg-opacity-input');
    const resetBtn = document.getElementById('reset-appearance-btn');

    const savedAppearance = loadAppearance();
    const seed = savedAppearance || defaultAppearanceSeed();
    colorInput.value = seed.color;
    opacityInput.value = seed.opacity;
    applyAppearance(savedAppearance);

    settingsBtn.onclick = () => { settingsPanel.hidden = !settingsPanel.hidden; };

    const commitAppearance = () => {
      const appearance = { color: colorInput.value, opacity: Number(opacityInput.value) };
      saveAppearance(appearance);
      applyAppearance(appearance);
    };
    colorInput.oninput = commitAppearance;
    opacityInput.oninput = commitAppearance;

    resetBtn.onclick = () => {
      localStorage.removeItem(APPEARANCE_KEY);
      const fresh = defaultAppearanceSeed();
      colorInput.value = fresh.color;
      opacityInput.value = fresh.opacity;
      applyAppearance(null);
    };

    if (loadToken()) {
      init();
    } else {
      // Try a silent, popup-free auth first (works if you've already granted
      // consent in this browser before). Falls back to showing Connect button.
      ensureFreshToken(init, false);
    }
  };

  function init() {
    document.getElementById('connect-screen').hidden = true;
    document.getElementById('tasks-screen').hidden = false;
    loadTaskLists();
  }

  // ---- API helpers ----
  async function apiFetch(url, options = {}) {
    const doFetch = () => fetch(url, {
      ...options,
      headers: { ...(options.headers || {}), Authorization: `Bearer ${accessToken}` },
    });
    let res = await doFetch();
    if (res.status === 401) {
      // token expired or revoked mid-session — re-prompt for consent
      await new Promise((resolve) => ensureFreshToken(resolve, true));
      res = await doFetch();
    }
    return res;
  }

  async function loadTaskLists() {
    const res = await apiFetch(`${API_ROOT}/users/@me/lists`);
    if (!res.ok) return showError('Could not load task lists (' + res.status + ')');
    const data = await res.json();
    const select = document.getElementById('list-select');
    select.innerHTML = '';
    (data.items || []).forEach((list) => {
      const opt = document.createElement('option');
      opt.value = list.id;
      opt.textContent = list.title;
      select.appendChild(opt);
    });
    currentListId = select.value;
    loadTasks(currentListId);
  }

  async function loadTasks(listId) {
    if (!listId) return;
    const res = await apiFetch(
      `${API_ROOT}/lists/${listId}/tasks?showCompleted=false&showHidden=false`
    );
    if (!res.ok) return showError('Could not load tasks (' + res.status + ')');
    const data = await res.json();
    const items = data.items || [];
    const ul = document.getElementById('task-list');
    ul.innerHTML = '';
    if (items.length === 0) {
      const li = document.createElement('li');
      li.className = 'empty';
      li.textContent = 'No tasks 🎉';
      ul.appendChild(li);
      return;
    }
    const roots = buildTaskTree(items);
    renderTaskTree(roots, listId, ul, 0);
  }

  // Google returns subtasks as regular task objects with a `parent` field
  // pointing at their parent task's id. Group them so subtasks render
  // nested under their parent instead of as siblings.
  function buildTaskTree(items) {
    const byId = {};
    items.forEach((t) => { byId[t.id] = { ...t, children: [] }; });
    const roots = [];
    items.forEach((t) => {
      if (t.parent && byId[t.parent]) {
        byId[t.parent].children.push(byId[t.id]);
      } else {
        roots.push(byId[t.id]);
      }
    });
    const sortRec = (list) => {
      list.sort((a, b) => (a.position || '').localeCompare(b.position || ''));
      list.forEach((t) => sortRec(t.children));
    };
    sortRec(roots);
    return roots;
  }

  // Renders a flat <li> list with indentation per depth (rather than nested
  // <ul>s) so drag-and-drop reordering logic only has to compare a
  // data-parent-id attribute, not walk the DOM tree.
  function renderTaskTree(tasks, listId, container, depth) {
    tasks.forEach((task) => {
      const li = document.createElement('li');
      li.dataset.taskId = task.id;
      li.dataset.parentId = task.parent || '';
      li.draggable = true;
      li.style.paddingLeft = (14 + depth * 22) + 'px';
      const cb = document.createElement('input');
      cb.type = 'checkbox';
      cb.onchange = () => completeTask(listId, task.id, li);
      const textWrap = document.createElement('div');
      textWrap.style.flex = '1';
      textWrap.style.minWidth = '0';
      const span = document.createElement('span');
      span.textContent = task.title || '(untitled)';
      textWrap.appendChild(span);
      if (task.notes) {
        const notes = document.createElement('div');
        notes.className = 'notes';
        notes.textContent = task.notes;
        textWrap.appendChild(notes);
      }
      li.appendChild(cb);
      li.appendChild(textWrap);
      attachDragHandlers(li, listId);
      container.appendChild(li);
      if (task.children.length) renderTaskTree(task.children, listId, container, depth + 1);
    });
  }

  // ---- Drag-and-drop reordering ----
  // Only allows reordering within the same parent group (i.e. among top-level
  // tasks, or among the subtasks of one parent) — dragging a task to become a
  // subtask of a different parent isn't handled here.
  let draggedEl = null;

  function attachDragHandlers(li, listId) {
    li.addEventListener('dragstart', () => {
      draggedEl = li;
      li.classList.add('dragging');
    });
    li.addEventListener('dragend', () => {
      li.classList.remove('dragging');
      draggedEl = null;
    });
    li.addEventListener('dragover', (e) => {
      e.preventDefault();
      if (draggedEl && draggedEl !== li && draggedEl.dataset.parentId === li.dataset.parentId) {
        li.classList.add('drag-over');
      }
    });
    li.addEventListener('dragleave', () => li.classList.remove('drag-over'));
    li.addEventListener('drop', async (e) => {
      e.preventDefault();
      li.classList.remove('drag-over');
      if (!draggedEl || draggedEl === li) return;
      if (draggedEl.dataset.parentId !== li.dataset.parentId) return; // different group — ignore
      const ul = document.getElementById('task-list');
      ul.insertBefore(draggedEl, li);
      const parentId = draggedEl.dataset.parentId || null;
      const prev = draggedEl.previousElementSibling;
      const previousId = (prev && prev.dataset.parentId === (parentId || '')) ? prev.dataset.taskId : null;
      await moveTask(listId, draggedEl.dataset.taskId, parentId, previousId);
      loadTasks(listId);
    });
  }

  async function moveTask(listId, taskId, parentId, previousId) {
    const params = new URLSearchParams();
    if (parentId) params.set('parent', parentId);
    if (previousId) params.set('previous', previousId);
    const qs = params.toString();
    const res = await apiFetch(
      `${API_ROOT}/lists/${listId}/tasks/${taskId}/move${qs ? '?' + qs : ''}`,
      { method: 'POST' }
    );
    if (!res.ok) showError('Could not reorder task (' + res.status + ')');
  }

  async function completeTask(listId, taskId, li) {
    li.classList.add('done');
    const res = await apiFetch(`${API_ROOT}/lists/${listId}/tasks/${taskId}`, {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ status: 'completed' }),
    });
    if (!res.ok) showError('Could not update task (' + res.status + ')');
    setTimeout(() => loadTasks(listId), 400);
  }

  async function addTask() {
    const input = document.getElementById('add-input');
    const title = input.value.trim();
    if (!title || !currentListId) return;
    input.value = '';
    const res = await apiFetch(`${API_ROOT}/lists/${currentListId}/tasks`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ title }),
    });
    if (!res.ok) showError('Could not add task (' + res.status + ')');
    loadTasks(currentListId);
  }

  function showError(msg) {
    const err = document.getElementById('error');
    err.hidden = false;
    err.textContent = msg;
    console.error(msg);
  }
</script>
</body>
</html>
